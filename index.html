<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>gustavo@github ~ terminal interativo</title>
<meta name="description" content="Luis Gustavo вҖ” perfil GitHub em formato de terminal interativo, com stack e projetos." />
<style>
  :root {
    --bg: #0a0e14;
    --bg2: #0d1420;
    --panel: #0d1117;
    --frame: #30363d;
    --frame-bright: #1f6feb;
    --muted: #7d8590;
    --ink: #c9d1d9;
    --key: #ffa657;
    --section: #58a6ff;
    --green: #3fb950;
    --accent: #22d3ee;
    --gold: #f2cc60;
    --err: #f85149;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: radial-gradient(circle at 50% 0%, var(--bg2), var(--bg) 60%);
    color: var(--ink);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .wrap {
    width: 100%;
    max-width: 860px;
  }

  .tag {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }

  .tag b { color: var(--ink); font-weight: 600; }

  .term {
    background: linear-gradient(180deg, var(--panel), #0a0e14);
    border: 1px solid var(--frame);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(31,111,235,0.06);
    overflow: hidden;
  }

  .titlebar {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 34px;
    border-bottom: 1px solid var(--frame);
    background: rgba(255,255,255,0.015);
  }

  .dots { position: absolute; left: 14px; display: flex; gap: 8px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }

  .titlebar span { color: var(--muted); font-size: 12.5px; }

  #screen {
    height: 62vh;
    min-height: 380px;
    max-height: 560px;
    overflow-y: auto;
    padding: 18px 20px;
    font-size: 13.5px;
    line-height: 1.65;
    scrollbar-width: thin;
    scrollbar-color: var(--frame) transparent;
  }

  #screen::-webkit-scrollbar { width: 8px; }
  #screen::-webkit-scrollbar-thumb { background: var(--frame); border-radius: 8px; }

  .line { white-space: pre-wrap; word-break: break-word; }
  .prompt-line { display: flex; gap: 8px; }
  .p-user { color: var(--green); font-weight: 700; }
  .p-at { color: var(--muted); }
  .p-host { color: var(--accent); font-weight: 700; }
  .p-path { color: var(--key); }
  .p-cmd { color: var(--ink); }

  .out-key { color: var(--key); font-weight: 700; }
  .out-section { color: var(--section); font-weight: 700; }
  .out-muted { color: var(--muted); }
  .out-green { color: var(--green); }
  .out-gold { color: var(--gold); }
  .out-err { color: var(--err); }
  .out-link { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }
  .out-link:hover { color: var(--gold); border-color: var(--gold); }

  .inputline {
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--frame);
    padding: 12px 20px;
    background: rgba(255,255,255,0.012);
  }

  .inputline .prompt-line { flex: none; }

  #cmd {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font: inherit;
    font-size: 13.5px;
    caret-color: var(--green);
  }

  #cmd::placeholder { color: #3a4250; }

  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 14px;
  }

  .hint code {
    color: var(--ink);
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 4px;
  }

  .links {
    text-align: center;
    margin-top: 16px;
    font-size: 12.5px;
  }

  .links a {
    color: var(--muted);
    text-decoration: none;
    margin: 0 8px;
  }
  .links a:hover { color: var(--accent); }

  .footer {
    text-align: center;
    color: #4a5262;
    font-size: 11px;
    margin-top: 10px;
  }

  /* efeito matrix */
  #matrix {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 50;
    display: none;
  }
  #matrix canvas { width: 100%; height: 100%; display: block; }
  #matrix .exit {
    position: absolute;
    top: 14px;
    right: 18px;
    color: #3fb950;
    font-family: ui-monospace, monospace;
    font-size: 13px;
    cursor: pointer;
    z-index: 51;
    border: 1px solid #1a3d1a;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(0,0,0,0.4);
  }

  @media (prefers-reduced-motion: reduce) {
    * { scroll-behavior: auto !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="tag">terminal interativo de <b>Luis Gustavo</b> В· digite comandos, nГЈo clique em nada</div>

  <div class="term">
    <div class="titlebar">
      <div class="dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
      <span>gustavo@github: ~</span>
    </div>

    <div id="screen"></div>

    <div class="inputline">
      <span class="prompt-line">
        <span class="p-user">gustavo</span><span class="p-at">@</span><span class="p-host">github</span><span class="p-path">:~$</span>
      </span>
      <input id="cmd" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="digite um comandoвҖҰ" />
    </div>
  </div>

  <div class="hint">digite <code>help</code> para ver os comandos В· tente <code>stack</code>, <code>projects</code> ou <code>matrix</code></div>

  <div class="links">
    <a href="https://github.com/GustavoSousa-coder" target="_blank" rel="noopener">github</a>В·
    <a href="https://www.linkedin.com/in/luis-gustavo-633738319/" target="_blank" rel="noopener">linkedin</a>В·
    <a href="https://stackoverflow.com/users/32036742/luis-gustavo?tab=profile" target="_blank" rel="noopener">stackoverflow</a>В·
    <a href="mailto:sousa.gustavo.dev@gmail.com">email</a>
  </div>

  <div class="footer">renderizado no cliente, sem build step</div>
</div>

<div id="matrix">
  <div class="exit" id="matrixExit">fechar [x]</div>
  <canvas id="matrixCanvas"></canvas>
</div>

<script>
(function () {
  "use strict";

  var screen = document.getElementById("screen");
  var input = document.getElementById("cmd");
  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var history = [];
  var histIdx = -1;

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  function printRaw(html) {
    var line = document.createElement("div");
    line.className = "line";
    line.innerHTML = html;
    screen.appendChild(line);
    scrollDown();
  }

  function printText(text, cls) {
    var line = el("div", "line" + (cls ? " " + cls : ""), text);
    screen.appendChild(line);
    scrollDown();
  }

  function printBlank() {
    printText("");
  }

  function scrollDown() {
    screen.scrollTop = screen.scrollHeight;
  }

  function echoCommand(cmdText) {
    printRaw(
      '<span class="prompt-line"><span class="p-user">gustavo</span>' +
      '<span class="p-at">@</span><span class="p-host">github</span>' +
      '<span class="p-path">:~$</span> <span class="p-cmd">' + escapeHTML(cmdText) + "</span></span>"
    );
  }

  function escapeHTML(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function link(href, label) {
    return '<a class="out-link" href="' + href + '" target="_blank" rel="noopener">' + (label || href) + "</a>";
  }

  function kv(key, val) {
    return '<span class="out-key">' + key.padEnd(12, " ").replace(/ /g, "&nbsp;") + "</span>" + val;
  }

  function section(title) {
    return '<span class="out-section">вҖ” ' + title + " вҖ”</span>";
  }

  // ---------------------------------------------------------------------
  // comandos
  // ---------------------------------------------------------------------
  var COMMANDS = {
    help: function () {
      printText("comandos disponГӯveis:");
      printBlank();
      [
        ["whoami", "quem eu sou"],
        ["stack", "minhas stacks: backend, mobile, dados"],
        ["projects", "meus projetos / repositГіrios"],
        ["contributions", "sobre o grГЎfico de contribuiГ§Гөes"],
        ["contact", "como falar comigo"],
        ["links", "meus links (github, linkedin, etc)"],
        ["banner", "reimprime o banner"],
        ["clear", "limpa a tela"],
        ["matrix", "??? tenta e vГӘ"],
      ].forEach(function (c) {
        printRaw('  <span class="out-key">' + c[0].padEnd(15, " ").replace(/ /g, "&nbsp;") + "</span><span class=\"out-muted\">" + c[1] + "</span>");
      });
    },

    whoami: function () {
      printRaw(kv("Nome", "Luis Gustavo"));
      printRaw(kv("Foco", "Desenvolvedor Backend Java"));
      printRaw(kv("Faz", "APIs Restful com Spring & Spring Boot"));
      printRaw(kv("Docs", "SpringDoc (Swagger) &amp; testes com Mocks"));
      printRaw(kv("Mobile", "Apps Android com Kotlin"));
      printBlank();
      printRaw('<span class="out-muted">"Se o cГіdigo estГЎ testado, eu durmo tranquilo." вҳ•</span>');
    },

    stack: function () {
      printRaw(section("Backend"));
      printRaw(kv("Linguagens", "Java, Kotlin, Python"));
      printRaw(kv("Frameworks", "Spring, Spring Boot, JWT"));
      printRaw(kv("Build", "Maven, Gradle"));
      printRaw(kv("Dados", "MySQL, Supabase, Redis"));
      printBlank();
      printRaw(section("Mobile"));
      printRaw(kv("Linguagem", "Kotlin"));
      printRaw(kv("UI", "XML Layouts"));
      printRaw(kv("Rede", "Retrofit, OkHttp (interceptor JWT)"));
      printRaw(kv("Async/JSON", "Coroutines, Gson"));
      printBlank();
      printRaw(section("Ferramentas"));
      printRaw(kv("Fluxo Dev", "Git, GitHub, Postman, Ngrok"));
    },

    projects: function () {
      printText("veja todos os repositГіrios fixados no meu perfil:");
      printRaw("  " + link("https://github.com/GustavoSousa-coder?tab=repositories", "github.com/GustavoSousa-coder"));
      printBlank();
      printRaw('<span class="out-muted">a maior parte gira em torno de APIs Java/Spring e apps Android em Kotlin.</span>');
    },

    contributions: function () {
      printText("o grГЎfico animado de contribuiГ§Гөes fica no meu README de perfil,");
      printText("atualizado todo dia via GitHub Actions com dados reais.");
      printBlank();
      printRaw("  " + link("https://github.com/GustavoSousa-coder", "veja no meu perfil"));
    },

    contact: function () {
      printRaw(kv("Email", link("mailto:sousa.gustavo.dev@gmail.com", "sousa.gustavo.dev@gmail.com")));
      printRaw(kv("LinkedIn", link("https://www.linkedin.com/in/luis-gustavo-633738319/", "linkedin.com/in/luis-gustavo")));
      printRaw(kv("GitHub", link("https://github.com/GustavoSousa-coder", "github.com/GustavoSousa-coder")));
    },

    links: function () {
      printRaw(kv("Portfolio", link("https://github.com/GustavoSousa-coder", "github.com/GustavoSousa-coder")));
      printRaw(kv("LinkedIn", link("https://www.linkedin.com/in/luis-gustavo-633738319/")));
      printRaw(kv("StackOverflow", link("https://stackoverflow.com/users/32036742/luis-gustavo?tab=profile")));
      printRaw(kv("Email", link("mailto:sousa.gustavo.dev@gmail.com")));
    },

    banner: function () {
      printBanner();
    },

    clear: function () {
      screen.innerHTML = "";
    },

    matrix: function () {
      startMatrix();
    },

    sudo: function () {
      printText("permissГЈo negada: bonita tentativa рҹҳ„", "out-err");
    },

    ls: function () {
      printText("backend/  mobile/  README.md  cafe.sh*");
    },

    date: function () {
      printText(new Date().toLocaleString("pt-BR"));
    },
  };

  function run(raw) {
    var trimmed = raw.trim();
    if (!trimmed) return;

    echoCommand(raw);
    history.push(raw);
    histIdx = history.length;

    var cmd = trimmed.split(/\s+/)[0].toLowerCase();
    if (COMMANDS[cmd]) {
      COMMANDS[cmd]();
    } else {
      printText('comando nГЈo encontrado: "' + cmd + '" вҖ” digite "help" para ver os comandos disponГӯveis.', "out-err");
    }
    printBlank();
  }

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      var val = input.value;
      input.value = "";
      run(val);
    } else if (e.key === "ArrowUp") {
      if (histIdx > 0) {
        histIdx--;
        input.value = history[histIdx];
        setTimeout(function () { input.selectionStart = input.selectionEnd = input.value.length; }, 0);
      }
      e.preventDefault();
    } else if (e.key === "ArrowDown") {
      if (histIdx < history.length - 1) {
        histIdx++;
        input.value = history[histIdx];
      } else {
        histIdx = history.length;
        input.value = "";
      }
      e.preventDefault();
    }
  });

  document.addEventListener("click", function () {
    input.focus();
  });

  // ---------------------------------------------------------------------
  // banner inicial
  // ---------------------------------------------------------------------
  function printBanner() {
    var art = [
      " в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— ",
      "в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—",
      "в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘",
      "в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘",
      "в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ",
      " в•ҡв•җв•җв•җв•җв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•қ  в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ   в•ҡв•җв•җв•җв•җв•җв•қ ",
    ];
    var pre = document.createElement("pre");
    pre.style.margin = "0 0 6px 0";
    pre.style.color = "#3fb950";
    pre.style.fontSize = "9px";
    pre.style.lineHeight = "1.1";
    pre.style.overflowX = "auto";
    pre.textContent = art.join("\n");
    screen.appendChild(pre);

    printRaw('<span class="out-muted">Desenvolvedor Backend Java В· APIs Restful В· Database В· Mobile Kotlin</span>');
    printBlank();
    printRaw('digite <span class="out-key">help</span> para ver os comandos В· tente <span class="out-key">stack</span>, <span class="out-key">projects</span> ou <span class="out-key">matrix</span>');
    printBlank();
  }

  printBanner();
  input.focus();

  // ---------------------------------------------------------------------
  // easter egg: matrix rain
  // ---------------------------------------------------------------------
  function startMatrix() {
    if (reduceMotion) {
      printText("(efeito matrix desativado вҖ” reduced motion estГЎ ativo no seu sistema)", "out-muted");
      return;
    }
    var overlay = document.getElementById("matrix");
    var canvas = document.getElementById("matrixCanvas");
    var ctx = canvas.getContext("2d");
    overlay.style.display = "block";

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    var chars = "гӮўгӮӨгӮҰгӮЁгӮӘгӮ«гӮӯгӮҜгӮұгӮігӮөгӮ·гӮ№гӮ»гӮҪ01пҪёпҫһпҪҪпҫҖпҪіпҫһпҪ§пҪјпҫһпҫҶ{}<>/=+-*";
    var fontSize = 15;
    var cols = Math.floor(canvas.width / fontSize);
    var drops = new Array(cols).fill(1);

    var interval = setInterval(function () {
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#3fb950";
      ctx.font = fontSize + "px monospace";
      for (var i = 0; i < drops.length; i++) {
        var ch = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(ch, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }, 40);

    function close() {
      clearInterval(interval);
      overlay.style.display = "none";
      window.removeEventListener("resize", resize);
      input.focus();
    }

    document.getElementById("matrixExit").onclick = close;
    document.addEventListener("keydown", function esc(e) {
      if (e.key === "Escape") {
        close();
        document.removeEventListener("keydown", esc);
      }
    });
  }
})();
</script>

</body>
